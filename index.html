<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>certs.eknathalabs.com — Certification Exam Practice</title>
<style>
  :root{
    --bg:#0b0f14; --panel:#11171f; --panel-2:#161d27; --line:#212c39;
    --ink:#e7edf3; --muted:#7d8da0; --dim:#566374;
    --accent:#5ad1c9;            /* terminal teal */
    --ok:#4ade80; --bad:#f87171; --warn:#fbbf24;
    --hashicorp:#7b42bc; --google:#4285f4; --aws:#ff9900; --microsoft:#0078d4; --cncf:#326ce5;
    --mono:"SFMono-Regular",ui-monospace,"JetBrains Mono",Menlo,Consolas,monospace;
    --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;line-height:1.5}
  a{color:var(--accent)}
  .wrap{max-width:920px;margin:0 auto;padding:0 20px 120px}

  /* header / status line */
  header{border-bottom:1px solid var(--line);background:linear-gradient(180deg,#0d121a,#0b0f14)}
  .head-in{max-width:920px;margin:0 auto;padding:18px 20px;display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  .logo{font-family:var(--mono);font-size:15px;letter-spacing:.5px}
  .logo b{color:var(--accent)}
  .logo .blink{color:var(--accent);animation:blink 1.1s steps(2) infinite}
  @keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
  .tag{font-family:var(--mono);font-size:11px;color:var(--dim);margin-left:auto}

  h1{font-size:13px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;
    letter-spacing:2px;font-weight:600;margin:32px 0 14px}

  /* cert cards */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px;
    cursor:pointer;transition:.15s;position:relative;overflow:hidden}
  .card:hover{border-color:var(--accent);transform:translateY(-2px)}
  .card .bar{position:absolute;left:0;top:0;bottom:0;width:3px}
  .card .vendor{font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
  .card .name{font-weight:600;margin:6px 0 10px;font-size:15px}
  .card .meta{font-family:var(--mono);font-size:11px;color:var(--dim);display:flex;gap:14px}
  .badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;
    color:var(--ok);border:1px solid #1e3a2e;background:#0f1f17;border-radius:20px;padding:2px 8px}
  .dot{width:5px;height:5px;border-radius:50%;background:var(--ok)}

  /* set picker */
  .back{font-family:var(--mono);font-size:12px;color:var(--muted);cursor:pointer;
    display:inline-flex;gap:6px;align-items:center;margin:28px 0 4px;border:none;background:none;padding:0}
  .back:hover{color:var(--accent)}
  .cert-title{font-size:22px;font-weight:700;margin:8px 0 4px}
  .cert-sub{font-family:var(--mono);font-size:12px;color:var(--dim);margin-bottom:20px}
  .set-row{display:flex;align-items:center;justify-content:space-between;background:var(--panel);
    border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:10px}
  .set-row .info{font-family:var(--mono);font-size:11px;color:var(--dim);margin-top:3px}
  .modes{display:flex;gap:8px}
  .btn{font-family:var(--mono);font-size:12px;border:1px solid var(--line);background:var(--panel-2);
    color:var(--ink);border-radius:7px;padding:8px 14px;cursor:pointer;transition:.15s}
  .btn:hover{border-color:var(--accent);color:var(--accent)}
  .btn.primary{background:var(--accent);color:#04110f;border-color:var(--accent);font-weight:600}
  .btn.primary:hover{filter:brightness(1.08);color:#04110f}
  .btn:disabled{opacity:.4;cursor:not-allowed}

  /* exam runner */
  .runbar{position:sticky;top:0;z-index:5;background:var(--panel);border:1px solid var(--line);
    border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:16px;
    font-family:var(--mono);font-size:12px;margin-bottom:18px}
  .runbar .timer{color:var(--warn)}
  .runbar .qcount{color:var(--muted)}
  .runbar .modepill{margin-left:auto;color:var(--dim);text-transform:uppercase;letter-spacing:1px}
  .progress{height:3px;background:var(--line);border-radius:2px;overflow:hidden;margin-bottom:22px}
  .progress > i{display:block;height:100%;background:var(--accent);transition:width .3s}

  .qcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:22px;margin-bottom:18px}
  .qmeta{display:flex;gap:10px;font-family:var(--mono);font-size:10px;color:var(--dim);
    text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
  .qmeta .pill{border:1px solid var(--line);border-radius:20px;padding:2px 9px}
  .stem{font-size:16px;line-height:1.55;margin-bottom:18px}
  .stem code{font-family:var(--mono);background:var(--panel-2);padding:1px 6px;border-radius:4px;font-size:13px;color:var(--accent)}

  .opt{display:flex;gap:12px;align-items:flex-start;border:1px solid var(--line);background:var(--panel-2);
    border-radius:9px;padding:13px 15px;margin-bottom:9px;cursor:pointer;transition:.12s}
  .opt:hover{border-color:var(--dim)}
  .opt.sel{border-color:var(--accent)}
  .opt .mark{font-family:var(--mono);font-size:12px;width:20px;height:20px;border:1px solid var(--dim);
    border-radius:4px;display:grid;place-items:center;flex:none;color:var(--muted)}
  .opt.multi .mark{border-radius:4px}
  .opt.sel .mark{background:var(--accent);color:#04110f;border-color:var(--accent)}
  .opt .otext{flex:1;font-size:14px}
  .opt.correct{border-color:#1e5a3e;background:#0e1d16}
  .opt.wrong{border-color:#5a2424;background:#1d0e0e}
  .opt.correct .mark{background:var(--ok);border-color:var(--ok);color:#04110f}
  .opt.wrong .mark{background:var(--bad);border-color:var(--bad);color:#1d0e0e}
  .exp{display:none;margin-top:9px;font-size:13px;line-height:1.5;color:var(--muted);
    border-left:2px solid var(--line);padding-left:12px}
  .exp.show{display:block}
  .exp.r{border-color:var(--ok)} .exp.w{border-color:var(--bad)}
  .exp b{color:var(--ink)}

  .navbtns{display:flex;gap:10px;align-items:center;margin-top:6px}
  .navbtns .spacer{flex:1}

  /* results */
  .score-hero{text-align:center;padding:40px 0 30px}
  .score-num{font-family:var(--mono);font-size:60px;font-weight:700;line-height:1}
  .score-num.pass{color:var(--ok)} .score-num.fail{color:var(--bad)}
  .score-label{font-family:var(--mono);font-size:13px;letter-spacing:2px;text-transform:uppercase;
    color:var(--muted);margin-top:10px}
  .dom-break{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:18px;margin-top:8px}
  .dom-row{display:flex;align-items:center;gap:12px;font-family:var(--mono);font-size:12px;padding:7px 0}
  .dom-row .dname{flex:1;color:var(--muted)}
  .dom-bar{width:120px;height:6px;background:var(--line);border-radius:3px;overflow:hidden}
  .dom-bar > i{display:block;height:100%}

  .note{display:flex;gap:10px;background:#1a1607;border:1px solid #3a3110;border-radius:9px;
    padding:12px 14px;margin-bottom:18px;font-size:13px;line-height:1.5;color:#d9c88a}
  .note .ic{color:var(--warn);flex:none}
  .empty{font-family:var(--mono);font-size:12px;color:var(--dim);text-align:center;padding:40px}
  .hidden{display:none!important}
  @media(max-width:560px){.set-row{flex-direction:column;align-items:stretch;gap:12px}.modes{justify-content:stretch}.modes .btn{flex:1}}
</style>
</head>
<body>
<header>
  <div class="head-in">
    <span class="logo"><b>certs</b>.eknathalabs.com<span class="blink">█</span></span>
    <span class="tag">EknathaLabs · exam console</span>
  </div>
</header>

<div class="wrap">
  <!-- VIEW: cert list -->
  <section id="view-certs">
    <h1>// select certification</h1>
    <div class="grid" id="certGrid"><div class="empty">loading manifest…</div></div>
  </section>

  <!-- VIEW: set picker -->
  <section id="view-sets" class="hidden">
    <button class="back" onclick="showCerts()">‹ back to certifications</button>
    <div class="cert-title" id="setCertTitle"></div>
    <div class="cert-sub" id="setCertSub"></div>
    <div id="setList"></div>
  </section>

  <!-- VIEW: runner -->
  <section id="view-run" class="hidden">
    <div class="runbar">
      <span class="qcount" id="rbCount"></span>
      <span class="timer" id="rbTimer"></span>
      <span class="modepill" id="rbMode"></span>
    </div>
    <div class="progress"><i id="rbProg" style="width:0"></i></div>
    <div id="qHost"></div>
    <div class="navbtns">
      <button class="btn" id="btnPrev" onclick="prevQ()">‹ prev</button>
      <div class="spacer"></div>
      <button class="btn" id="btnNext" onclick="nextQ()">next ›</button>
      <button class="btn primary" id="btnSubmit" onclick="submitExam()">submit exam</button>
    </div>
  </section>

  <!-- VIEW: results -->
  <section id="view-results" class="hidden">
    <button class="back" onclick="showCerts()">‹ back to certifications</button>
    <div class="score-hero">
      <div class="score-num" id="scoreNum">0%</div>
      <div class="score-label" id="scoreLabel"></div>
    </div>
    <h1>// by domain</h1>
    <div class="dom-break" id="domBreak"></div>
    <div class="navbtns" style="margin-top:18px">
      <button class="btn primary" onclick="reviewAnswers()">review answers</button>
      <button class="btn" onclick="retrySet()">retry set</button>
    </div>
  </section>
</div>

<script>
const VENDOR_COLOR={HashiCorp:'--hashicorp',Google:'--google',AWS:'--aws',Microsoft:'--microsoft',CNCF:'--cncf'};
let MANIFEST=[], CERT=null, SET=null, MODE='exam'; // exam | practice
let QI=0, ANSWERS={}, TIMER=null, TIME_LEFT=0, REVIEWING=false;

const $=id=>document.getElementById(id);
const show=(...v)=>['view-certs','view-sets','view-run','view-results'].forEach(x=>$(x).classList.toggle('hidden',!v.includes(x)));

// ---- load manifest ----
fetch('data/manifest.json').then(r=>r.json()).then(d=>{MANIFEST=d.certs;renderCerts();})
  .catch(()=>$('certGrid').innerHTML='<div class="empty">could not load manifest.json — check the data/ path</div>');

function renderCerts(){
  $('certGrid').innerHTML=MANIFEST.map(c=>{
    const col=VENDOR_COLOR[c.vendor]||'--accent';
    return `<div class="card" onclick="openCert('${c.certId}')">
      <span class="bar" style="background:var(${col})"></span>
      <div class="vendor">${c.vendor}</div>
      <div class="name">${c.title}</div>
      <div class="meta"><span>${c.certId}</span></div>
    </div>`;}).join('');
}
function showCerts(){clearInterval(TIMER);show('view-certs');}

// ---- open a cert -> load its file ----
function openCert(id){
  const entry=MANIFEST.find(c=>c.certId===id);
  $('setList').innerHTML='<div class="empty">loading '+entry.file+'…</div>';
  $('setCertTitle').textContent=entry.title;
  $('setCertSub').textContent='';
  show('view-sets');
  fetch(entry.file).then(r=>r.json()).then(d=>{CERT=d;renderSets();})
    .catch(()=>$('setList').innerHTML='<div class="empty">'+entry.file+' not built yet</div>');
}
function renderSets(){
  $('setCertSub').textContent=`${CERT.vendor} · exam ${CERT.examVersion} · pass ${CERT.passScore}% · `;
  const badge=`<span class="badge"><span class="dot"></span>updated ${CERT.lastUpdated}</span>`;
  $('setCertSub').innerHTML=$('setCertSub').textContent+badge;
  const noteHtml = CERT.note ? `<div class="note"><span class="ic">▲</span><span>${CERT.note}</span></div>` : '';
  $('setList').innerHTML=noteHtml+CERT.sets.map(s=>`
    <div class="set-row">
      <div>
        <div style="font-weight:600">${s.name}</div>
        <div class="info">${s.questions.length} questions · ${s.timeLimitMin} min · scored ${CERT.passScore}% to pass</div>
      </div>
      <div class="modes">
        <button class="btn" onclick="startSet('${s.setId}','practice')">practice</button>
        <button class="btn primary" onclick="startSet('${s.setId}','exam')">exam mode</button>
      </div>
    </div>`).join('');
}

// ---- run a set ----
function startSet(setId,mode){
  SET=CERT.sets.find(s=>s.setId===setId);
  MODE=mode; QI=0; ANSWERS={}; REVIEWING=false;
  $('rbMode').textContent=mode==='exam'?'exam mode':'practice mode';
  $('btnSubmit').classList.toggle('hidden',mode!=='exam');
  if(mode==='exam'){TIME_LEFT=SET.timeLimitMin*60;startTimer();}
  else{$('rbTimer').textContent='';clearInterval(TIMER);}
  show('view-run'); renderQ();
}
function startTimer(){
  clearInterval(TIMER);
  TIMER=setInterval(()=>{
    TIME_LEFT--;
    const m=String(Math.floor(TIME_LEFT/60)).padStart(2,'0'),s=String(TIME_LEFT%60).padStart(2,'0');
    $('rbTimer').textContent=`⏱ ${m}:${s}`;
    if(TIME_LEFT<=0){clearInterval(TIMER);submitExam();}
  },1000);
}
function renderQ(){
  const q=SET.questions[QI], total=SET.questions.length;
  $('rbCount').textContent=`Q ${QI+1} / ${total}`;
  $('rbProg').style.width=((QI+1)/total*100)+'%';
  const dom=(CERT.domains.find(d=>d.id===q.domainId)||{}).name||q.domainId;
  const sel=ANSWERS[q.id]||[];
  const graded = REVIEWING || (MODE==='practice' && sel.length>0 && sel._checked);

  $('qHost').innerHTML=`<div class="qcard">
    <div class="qmeta">
      <span class="pill">${dom}</span>
      <span class="pill">${q.difficulty}</span>
      <span class="pill">${q.type==='multi'?'select all':'single'}</span>
    </div>
    <div class="stem">${q.stem}</div>
    <div id="opts">${q.options.map(o=>{
      const isSel=sel.includes(o.id);
      let cls='opt'+(q.type==='multi'?' multi':'')+(isSel?' sel':'');
      let expCls='exp', mark=isSel?'✓':'';
      if(graded){
        if(o.correct){cls+=' correct';expCls+=' show r';mark='✓';}
        else if(isSel){cls+=' wrong';expCls+=' show w';mark='✕';}
        else{expCls+=' show';}
      }
      return `<div class="${cls}" ${graded?'':`onclick="pick('${q.id}','${o.id}','${q.type}')"`}>
        <div class="mark">${mark}</div>
        <div>
          <div class="otext">${o.text}</div>
          <div class="${expCls}"><b>${o.correct?'Correct.':'Incorrect.'}</b> ${o.explanation.replace(/^(Correct|Wrong|Incorrect)\.\s*/i,'')}</div>
        </div>
      </div>`;}).join('')}</div>
    ${MODE==='practice'&&!graded?`<div class="navbtns" style="margin-top:14px"><button class="btn primary" onclick="checkQ('${q.id}')">check answer</button></div>`:''}
    ${graded&&q.reference?`<div style="font-family:var(--mono);font-size:11px;color:var(--dim);margin-top:14px">ref: <a href="${q.reference}" target="_blank" rel="noopener">${q.reference}</a></div>`:''}
  </div>`;

  $('btnPrev').disabled=QI===0;
  $('btnNext').disabled=QI===total-1;
}
function pick(qid,oid,type){
  let sel=ANSWERS[qid]||[];
  if(type==='multi'){ sel=sel.includes(oid)?sel.filter(x=>x!==oid):[...sel,oid]; }
  else{ sel=[oid]; }
  ANSWERS[qid]=sel; renderQ();
}
function checkQ(qid){ (ANSWERS[qid]=ANSWERS[qid]||[])._checked=true; renderQ(); }
function nextQ(){if(QI<SET.questions.length-1){QI++;renderQ();}}
function prevQ(){if(QI>0){QI--;renderQ();}}

// ---- scoring ----
function gradeQuestion(q){
  const sel=(ANSWERS[q.id]||[]).filter(Boolean);
  const correct=q.options.filter(o=>o.correct).map(o=>o.id);
  const allRight=correct.every(id=>sel.includes(id));
  const noWrong=sel.every(id=>correct.includes(id));
  return sel.length>0 && allRight && noWrong;
}
function submitExam(){
  clearInterval(TIMER);
  let right=0; const byDom={};
  SET.questions.forEach(q=>{
    const ok=gradeQuestion(q); if(ok)right++;
    const d=q.domainId; byDom[d]=byDom[d]||{r:0,t:0}; byDom[d].t++; if(ok)byDom[d].r++;
  });
  const pct=Math.round(right/SET.questions.length*100);
  const pass=pct>=CERT.passScore;
  $('scoreNum').textContent=pct+'%';
  $('scoreNum').className='score-num '+(pass?'pass':'fail');
  $('scoreLabel').textContent=`${pass?'PASS':'FAIL'} · ${right}/${SET.questions.length} correct · need ${CERT.passScore}%`;
  $('domBreak').innerHTML=Object.entries(byDom).map(([id,v])=>{
    const name=(CERT.domains.find(d=>d.id===id)||{}).name||id;
    const p=Math.round(v.r/v.t*100), col=p>=CERT.passScore?'--ok':'--bad';
    return `<div class="dom-row"><span class="dname">${name}</span>
      <div class="dom-bar"><i style="width:${p}%;background:var(${col})"></i></div>
      <span style="color:var(${col});width:64px;text-align:right">${v.r}/${v.t}</span></div>`;}).join('');
  show('view-results');
}
function reviewAnswers(){REVIEWING=true;QI=0;$('btnSubmit').classList.add('hidden');show('view-run');renderQ();}
function retrySet(){startSet(SET.setId,MODE);}
</script>
</body>
</html>
